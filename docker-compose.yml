version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: merlin_postgres
    environment:
      POSTGRES_DB: merlin_db
      POSTGRES_USER: merlin_user
      POSTGRES_PASSWORD: secure_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U merlin_user -d merlin_db']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: merlin_app
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: merlin_db
      DB_USER: merlin_user
      DB_PASSWORD: secure_password
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
